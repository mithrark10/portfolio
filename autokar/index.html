<div id="cs-host"></div>
<script type="text/html" id="cs-tpl">
<!-- AutoKar, Product Design Case Study by Mithra Ramkumar -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AutoKar, Case Study · Mithra Ramkumar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:host{
  --ink:#161616; --ink-soft:#2a2a2a;
  --yellow:#FFC400; --yellow-deep:#F2B600; --yellow-glow:#FFE08A;
  --cream:#FBEDC4; --cream-soft:#FDF6E3;
  --paper:#ffffff;
  --green:#2FA84F; --red:#E33B2E; --graphite:#3b3b3b;
  --muted:#6f6a5e; --muted-ink:#7c7c7c;
  --line:#E7DBBB; --line-ink:#e9e9e9;
  --display:'Bricolage Grotesque',system-ui,sans-serif;
  --body:'Inter',system-ui,sans-serif;
  --mono:'Space Mono',ui-monospace,monospace;
  --maxw:1080px;
}
*{box-sizing:border-box}
:host{scroll-behavior:smooth}
:host{
  margin:0; background:var(--cream-soft); color:var(--ink);
  font-family:var(--body); font-size:17px; line-height:1.65;
  -webkit-font-smoothing:antialiased; overflow-x:hidden;
}
h1,h2,h3,h4{font-family:var(--display); font-weight:700; line-height:1.04; letter-spacing:-.02em; margin:0}
p{margin:0 0 1em}
a{color:inherit}
::selection{background:var(--yellow); color:var(--ink)}

/* ---------- top bar ---------- */
.topbar{
  position:sticky; top:0; z-index:60;
  display:flex; align-items:center; gap:18px;
  padding:14px clamp(18px,5vw,48px);
  background:rgba(253,246,227,.82); backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}
.brand{display:flex; align-items:center; gap:10px; font-family:var(--display); font-weight:800; font-size:20px; letter-spacing:-.03em; text-decoration:none}
.brand .k{color:var(--yellow-deep)}
.brand svg{display:block}
.topnav{margin-left:auto; display:flex; align-items:center; gap:22px}
.topnav a{font-family:var(--mono); font-size:12px; letter-spacing:.04em; text-decoration:none; color:var(--muted); text-transform:uppercase}
.topnav a:hover{color:var(--ink)}
@media(max-width:760px){ .topnav a.hide-sm{display:none} }

/* progress meter in bar */
.meter{display:flex; align-items:center; gap:8px; font-family:var(--mono); font-size:11px; color:var(--muted)}
.meter .track{width:64px; height:5px; border-radius:5px; background:var(--line); overflow:hidden}
.meter .fill{height:100%; width:0; background:var(--yellow-deep)}
@media(max-width:520px){ .meter{display:none} }

/* ---------- hero ---------- */
.hero{position:relative; padding:clamp(40px,7vw,84px) clamp(18px,5vw,48px) clamp(30px,5vw,60px); max-width:var(--maxw); margin:0 auto}
.eyebrow{font-family:var(--mono); font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); display:flex; align-items:center; gap:10px}
.eyebrow::before{content:""; width:22px; height:1px; background:var(--graphite); display:inline-block}
.hero h1{font-size:clamp(40px,8.4vw,86px); font-weight:800; margin:18px 0 0; max-width:14ch}
.hero h1 .hl{position:relative; white-space:nowrap}
.hero h1 .hl::after{content:""; position:absolute; left:-2px; right:-2px; bottom:.08em; height:.34em; background:var(--yellow); z-index:-1; border-radius:2px}
.hero .lede{font-size:clamp(18px,2.4vw,22px); color:var(--ink-soft); max-width:54ch; margin-top:22px}
.hero-route{margin:34px 0 0}

.meta{display:flex; flex-wrap:wrap; gap:0; margin-top:38px; border-top:1px solid var(--line)}
.meta div{padding:16px 26px 16px 0; margin-right:26px; border-right:1px solid var(--line)}
.meta div:last-child{border-right:0}
.meta .k{font-family:var(--mono); font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); display:block; margin-bottom:4px}
.meta .v{font-family:var(--display); font-weight:600; font-size:15px}
@media(max-width:620px){ .meta div{border-right:0; padding:10px 0; margin-right:0; flex:1 1 46%} }

/* ---------- journey / spine ---------- */
.journey{position:relative; max-width:var(--maxw); margin:0 auto; padding:20px clamp(18px,5vw,48px) 0}
.spine{position:absolute; left:clamp(26px,5vw,52px); top:0; bottom:120px; width:2px; z-index:0}
.spine .track{position:absolute; inset:0; border-left:2px dashed var(--line); }
.spine .trail{position:absolute; left:0; top:0; width:2px; height:0; background:linear-gradient(var(--green),var(--yellow-deep))}
.spine .auto{position:absolute; left:1px; top:0; transform:translate(-50%,-50%); will-change:top; transition:top .08s linear}
.spine .auto svg{display:block; filter:drop-shadow(0 6px 10px rgba(0,0,0,.18))}

.cs{position:relative; z-index:1; padding-left:clamp(40px,7.5vw,86px)}
.cs-section{padding:clamp(44px,7vw,84px) 0; position:relative}
.cs-section::before{ /* the dot on the spine */
  content:""; position:absolute; top:clamp(58px,8vw,98px);
  left:calc(-1 * clamp(40px,7.5vw,86px) + clamp(26px,5vw,52px) - clamp(18px,5vw,48px) + 0px);
  width:0;
}
.dot{position:absolute; left:calc(-1*clamp(40px,7.5vw,86px) - clamp(18px,5vw,48px) + clamp(26px,5vw,52px)); }

.snum{font-family:var(--mono); font-size:12px; letter-spacing:.12em; color:var(--muted)}
.cs-section h2{font-size:clamp(28px,4.4vw,44px); font-weight:700; margin:12px 0 0; max-width:20ch}
.cs-section .sub{font-size:clamp(17px,2vw,19px); color:var(--ink-soft); max-width:62ch; margin-top:16px}

.lead-q{font-family:var(--display); font-weight:600; font-size:clamp(20px,2.6vw,26px); line-height:1.3; max-width:30ch; color:var(--ink)}

/* generic prose */
.prose{max-width:64ch}
.prose p{color:var(--ink-soft)}

/* ---------- problem statement cards ---------- */
.barriers{display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-top:30px}
.barrier{background:var(--paper); border:1px solid var(--line-ink); border-radius:16px; padding:22px}
.barrier .n{font-family:var(--mono); font-size:12px; color:var(--red); letter-spacing:.08em}
.barrier h4{font-size:18px; margin:10px 0 6px}
.barrier p{font-size:15px; color:var(--muted-ink); margin:0}
@media(max-width:720px){ .barriers{grid-template-columns:1fr} }

/* ---------- research method ---------- */
.methods{display:grid; grid-template-columns:repeat(2,1fr); gap:14px; margin-top:28px}
.method{display:flex; gap:14px; align-items:flex-start; background:var(--cream); border:1px solid var(--line); border-radius:14px; padding:18px 20px}
.method .ic{flex:0 0 36px; height:36px; border-radius:10px; background:var(--ink); color:var(--yellow); display:grid; place-items:center; font-family:var(--display); font-weight:800}
.method h4{font-size:16px; margin:2px 0 4px}
.method p{font-size:14.5px; color:var(--muted-ink); margin:0}
@media(max-width:720px){ .methods{grid-template-columns:1fr} }

.insightbar{margin-top:34px; border-left:3px solid var(--yellow-deep); padding:6px 0 6px 22px}
.insightbar .k{font-family:var(--mono); font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted)}
.insightbar .t{font-family:var(--display); font-weight:600; font-size:clamp(19px,2.4vw,24px); line-height:1.3; margin-top:6px; max-width:34ch}

/* ---------- personas ---------- */
.personas{display:grid; grid-template-columns:repeat(2,1fr); gap:18px; margin-top:30px}
.persona{background:var(--paper); border:1px solid var(--line-ink); border-radius:18px; padding:24px; position:relative; overflow:hidden}
.persona::after{content:""; position:absolute; right:-30px; top:-30px; width:120px; height:120px; border-radius:50%; background:var(--yellow-glow); opacity:.4}
.persona .ava{width:54px; height:54px; border-radius:14px; display:grid; place-items:center; font-family:var(--display); font-weight:800; font-size:22px; color:var(--ink); background:var(--yellow); position:relative; z-index:1}
.persona h4{font-size:19px; margin:14px 0 2px; position:relative; z-index:1}
.persona .role{font-family:var(--mono); font-size:12px; color:var(--muted); margin-bottom:12px; position:relative; z-index:1}
.persona .need{font-size:15px; color:var(--ink-soft); position:relative; z-index:1; margin:0 0 12px}
.persona .tag{display:inline-block; font-family:var(--mono); font-size:11px; padding:4px 9px; border-radius:20px; background:var(--cream); border:1px solid var(--line); margin:0 6px 6px 0; position:relative; z-index:1; color:var(--ink-soft)}
@media(max-width:720px){ .personas{grid-template-columns:1fr} }

/* ---------- principles ---------- */
.principles{display:grid; grid-template-columns:repeat(3,1fr); gap:0; margin-top:30px; border:1px solid var(--line-ink); border-radius:18px; overflow:hidden; background:var(--paper)}
.principle{padding:26px 24px; border-right:1px solid var(--line-ink)}
.principle:last-child{border-right:0}
.principle .pn{font-family:var(--mono); font-size:12px; color:var(--yellow-deep); letter-spacing:.1em}
.principle h4{font-size:19px; margin:12px 0 8px}
.principle p{font-size:14.5px; color:var(--muted-ink); margin:0}
@media(max-width:820px){ .principles{grid-template-columns:1fr} .principle{border-right:0; border-bottom:1px solid var(--line-ink)} .principle:last-child{border-bottom:0} }

/* ---------- interactive prototype ---------- */
.proto-wrap{display:grid; grid-template-columns:minmax(0,1fr) auto; gap:clamp(24px,4vw,56px); align-items:center; margin-top:36px}
@media(max-width:880px){ .proto-wrap{grid-template-columns:1fr; justify-items:center} .proto-copy{order:2} }
.proto-copy h4{font-size:20px; margin-bottom:10px}
.proto-copy p{color:var(--ink-soft); font-size:15.5px; max-width:46ch}
.proto-steps{list-style:none; padding:0; margin:18px 0 0; counter-reset:s}
.proto-steps li{font-family:var(--mono); font-size:13px; color:var(--muted-ink); padding:7px 0 7px 30px; position:relative; border-bottom:1px dashed var(--line)}
.proto-steps li::before{counter-increment:s; content:counter(s,decimal-leading-zero); position:absolute; left:0; color:var(--yellow-deep)}
.proto-steps li.on{color:var(--ink)}
.proto-hint{font-family:var(--mono); font-size:12px; color:var(--muted); margin-top:16px; display:flex; align-items:center; gap:8px}

/* phone */
.phone{
  width:300px; height:620px; border-radius:42px; background:#0c0c0c;
  padding:10px; box-shadow:0 30px 60px -20px rgba(0,0,0,.45), 0 0 0 2px #000, inset 0 0 0 6px #1c1c1c;
  position:relative; flex:0 0 auto;
}
.phone .notch{position:absolute; top:16px; left:50%; transform:translateX(-50%); width:120px; height:24px; background:#0c0c0c; border-radius:0 0 16px 16px; z-index:30}
.screen{position:relative; width:100%; height:100%; border-radius:33px; overflow:hidden; background:var(--cream); font-size:14px; color:var(--ink)}
.screen .st{position:absolute; inset:0; opacity:0; pointer-events:none; transition:opacity .35s ease; display:flex; flex-direction:column}
.screen .st.show{opacity:1; pointer-events:auto}

/* phone top row */
.ph-top{display:flex; align-items:center; padding:18px 16px 6px; gap:10px}
.ph-back{width:30px; height:30px; border-radius:9px; border:1px solid rgba(0,0,0,.12); background:#fff; display:grid; place-items:center; cursor:pointer; font-size:16px}
.langtog{margin-left:auto; display:flex; align-items:center; gap:7px; background:#fff; border:1px solid rgba(0,0,0,.14); border-radius:20px; padding:5px 9px; cursor:pointer; font-size:12px; font-weight:600; user-select:none}
.langtog .sw{width:30px; height:17px; border-radius:20px; background:var(--yellow); position:relative; transition:background .2s}
.langtog .sw::after{content:""; position:absolute; top:2px; left:2px; width:13px; height:13px; border-radius:50%; background:#fff; transition:left .2s}
.langtog.ta .sw::after{left:15px}
.langtog .lab{color:var(--muted-ink)}
.langtog .lab.act{color:var(--ink)}

.ph-title{font-family:var(--display); font-weight:700; font-size:19px; text-align:center; padding:10px 24px 0; line-height:1.2}
.ph-body{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding:18px 18px 16px; text-align:center}

/* mic */
.mic{width:96px; height:96px; border-radius:50%; background:var(--yellow); display:grid; place-items:center; margin-top:30px; cursor:pointer; position:relative; transition:transform .15s}
.mic:active{transform:scale(.95)}
.mic svg{width:34px; height:34px}
.mic.live{animation:none}
.mic .ring{position:absolute; inset:0; border-radius:50%; box-shadow:0 0 0 0 rgba(255,196,0,.55)}
.mic.live .ring{animation:pulse 1.4s ease-out infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,196,0,.55)}100%{box-shadow:0 0 0 26px rgba(255,196,0,0)}}
.mic-cap{margin-top:24px; color:var(--muted-ink); font-size:15px; max-width:22ch; line-height:1.45}
.listening{margin-top:18px; font-family:var(--mono); font-size:12px; color:var(--ink); min-height:18px}

/* resolved address card */
.addr{background:#fff; border:1px solid rgba(0,0,0,.1); border-radius:14px; padding:14px 14px; width:100%; text-align:left; margin-top:8px; display:flex; gap:10px; align-items:flex-start}
.pin{width:11px; height:11px; border-radius:50%; margin-top:5px; flex:0 0 11px}
.pin.g{background:var(--green); box-shadow:0 0 0 3px rgba(47,168,79,.18)}
.pin.r{background:var(--red); box-shadow:0 0 0 3px rgba(227,59,46,.16)}
.addr .a1{font-weight:600; font-size:14px}
.addr .a2{font-size:12px; color:var(--muted-ink)}

/* generic phone button */
.pbtn{margin-top:auto; width:100%; border:0; border-radius:14px; padding:15px; font-family:var(--display); font-weight:700; font-size:16px; cursor:pointer}
.pbtn.solid{background:var(--ink); color:#fff}
.pbtn.yellow{background:var(--yellow); color:var(--ink)}
.pbtn:disabled{opacity:.5; cursor:default}

/* rides list */
.rides{width:100%; background:#fff; border-radius:18px 18px 0 0; padding:14px 14px 16px; margin-top:auto; box-shadow:0 -10px 30px rgba(0,0,0,.06)}
.rides h5{font-family:var(--display); font-weight:700; font-size:17px; margin:0 0 10px; text-align:left}
.ride{display:flex; align-items:center; gap:12px; padding:10px; border-radius:12px; border:1.5px solid transparent; cursor:pointer; text-align:left}
.ride.sel{border-color:var(--yellow-deep); background:var(--cream)}
.ride .veh{font-size:22px; width:30px; text-align:center}
.ride .nm{font-weight:700; font-size:15px}
.ride .meta{font-size:11.5px; color:var(--muted-ink)}
.ride .pr{margin-left:auto; font-weight:700; font-size:15px}
.mapbg{position:absolute; inset:0; background:
  radial-gradient(circle at 30% 28%, #e9efe6, transparent 40%),
  radial-gradient(circle at 72% 60%, #e7ecef, transparent 45%),
  #eef1ec; }
.mapbg .road{position:absolute; background:#cdd3cb; border-radius:6px}
.mapbg .route{position:absolute; left:34%; top:30%; width:3px; height:46%; background:#1d1d1d; border-radius:3px; transform:rotate(12deg)}
.mapbg .gd{position:absolute; left:33%; top:28%; width:12px; height:12px; border-radius:50%; background:var(--green); box-shadow:0 0 0 4px rgba(47,168,79,.2)}
.mapbg .rd{position:absolute; left:54%; top:72%; width:12px; height:12px; border-radius:50%; background:var(--red); box-shadow:0 0 0 4px rgba(227,59,46,.18)}

/* confirmed */
.drivercard{width:100%; background:#fff; border-radius:18px 18px 0 0; padding:16px 14px; margin-top:auto; box-shadow:0 -10px 30px rgba(0,0,0,.06)}
.drv{display:flex; align-items:center; gap:12px}
.drv .pic{width:46px; height:46px; border-radius:50%; background:linear-gradient(135deg,#d9b15a,#b07e3c); display:grid; place-items:center; color:#fff; font-family:var(--display); font-weight:800}
.drv .nm{font-weight:700; font-size:15px}
.drv .rt{font-size:12px; color:var(--muted-ink)}
.drv .veh{margin-left:auto; font-size:26px}
.otpline{display:flex; align-items:center; gap:8px; margin-top:14px; padding:10px 12px; border:1px solid rgba(0,0,0,.1); border-radius:12px}
.otpline .lab{font-family:var(--mono); font-size:12px; color:var(--muted-ink); margin-right:auto}
.otpbox{width:30px; height:34px; border:1px solid rgba(0,0,0,.18); border-radius:8px; display:grid; place-items:center; font-family:var(--display); font-weight:800; font-size:16px; background:var(--cream)}
.cc{display:flex; gap:10px; margin-top:12px}
.cc button{flex:1; border:1px solid rgba(0,0,0,.14); background:#fff; border-radius:12px; padding:11px; font-weight:700; font-size:14px; cursor:pointer}
.cc button.call{background:var(--yellow); border-color:var(--yellow)}
.arriving{position:absolute; top:74px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; font-family:var(--mono); font-size:12px; padding:5px 12px; border-radius:20px; z-index:5}

.reset{margin-top:14px; background:none; border:1px solid var(--line); border-radius:20px; padding:6px 14px; font-family:var(--mono); font-size:12px; cursor:pointer; color:var(--muted-ink)}
.reset:hover{color:var(--ink); border-color:var(--graphite)}

/* ---------- screen breakdown ---------- */
.breakdowns{margin-top:24px; display:flex; flex-direction:column; gap:14px}
.bd{display:grid; grid-template-columns:46px 1fr; gap:16px; align-items:start; background:var(--paper); border:1px solid var(--line-ink); border-radius:14px; padding:18px 20px}
.bd .lab{font-family:var(--display); font-weight:800; font-size:22px; color:var(--yellow-deep)}
.bd h4{font-size:17px; margin:0 0 5px}
.bd p{font-size:14.5px; color:var(--muted-ink); margin:0}

/* ---------- outcomes ---------- */
.stats{display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-top:30px}
.stat{background:var(--ink); color:#fff; border-radius:18px; padding:26px 22px}
.stat .big{font-family:var(--display); font-weight:800; font-size:clamp(34px,5vw,52px); line-height:1; color:var(--yellow)}
.stat .lab{font-size:14px; color:#d9d9d9; margin-top:10px}
@media(max-width:720px){ .stats{grid-template-columns:1fr} }

/* drop / reflection */
.drop-sec{padding:clamp(50px,7vw,90px) 0 clamp(30px,5vw,60px)}
.reflection{max-width:62ch}
.reflection p{color:var(--ink-soft); font-size:17px}

/* footer */
.foot{background:var(--ink); color:#eee; margin-top:30px}
.foot-in{max-width:var(--maxw); margin:0 auto; padding:clamp(40px,6vw,72px) clamp(18px,5vw,48px); display:flex; flex-wrap:wrap; gap:30px; align-items:flex-end; justify-content:space-between}
.foot h3{font-size:clamp(26px,4vw,40px); color:#fff; max-width:18ch}
.foot .who{font-family:var(--mono); font-size:13px; color:var(--yellow); margin-top:14px}
.contacts{display:flex; flex-direction:column; gap:8px}
.contacts a{font-family:var(--mono); font-size:13px; color:#ccc; text-decoration:none}
.contacts a:hover{color:var(--yellow)}
.copyr{max-width:var(--maxw); margin:0 auto; padding:0 clamp(18px,5vw,48px) 30px; font-family:var(--mono); font-size:11px; color:#777}

/* ---------- interactive: what riders told me ---------- */
.voices{display:grid; grid-template-columns:repeat(2,1fr); gap:14px; margin-top:30px}
@media(max-width:720px){ .voices{grid-template-columns:1fr} }
.voice{background:var(--paper); border:1px solid var(--line-ink); border-radius:16px; padding:18px 44px 18px 20px; cursor:pointer; position:relative; transition:border-color .2s, box-shadow .2s}
.voice:hover{border-color:var(--graphite)}
.voice.open{border-color:var(--yellow-deep); box-shadow:0 10px 26px -16px rgba(0,0,0,.25)}
.voice .heard{display:flex; gap:10px; align-items:flex-start}
.voice .qm{font-family:var(--display); font-weight:800; font-size:26px; color:var(--yellow-deep); line-height:.7}
.voice .qt{font-family:var(--display); font-weight:600; font-size:16.5px; line-height:1.35; color:var(--ink)}
.voice .who2{font-family:var(--mono); font-size:11px; color:var(--muted); margin-top:8px; padding-left:26px}
.voice .resp{max-height:0; overflow:hidden; transition:max-height .35s ease, margin .35s ease; margin-top:0}
.voice.open .resp{max-height:240px; margin-top:14px}
.voice .resp-in{border-top:1px dashed var(--line); padding-top:12px}
.voice .resp .rk{font-family:var(--mono); font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--green)}
.voice .resp p{font-size:14px; color:var(--ink-soft); margin:5px 0 0}

    <!-- 01 PROBLEM -->
    <section class="cs-section rv" id="problem">
      <div class="snum">STOP 01, PICK-UP</div>
      <h2>The auto is everywhere. The app for it isn’t.</h2>
      <p class="sub">Auto-rickshaws are the default short-distance ride across Indian cities, cheap, plentiful, and door-to-door. Yet the people who lean on them most are often the ones existing ride apps quietly lock out.</p>

      <div class="barriers">
        <div class="barrier rv">
          <div class="n">BARRIER 01</div>
          <h4>Typing an address is hard</h4>
          <p>Search-and-type pickup flows assume comfort with English keyboards and exact street names. Many riders have neither.</p>
        </div>
        <div class="barrier rv">
          <div class="n">BARRIER 02</div>
          <h4>The app speaks one language</h4>
          <p>Interfaces ship in English first. For a first-time smartphone user, that alone ends the journey at screen one.</p>
        </div>
        <div class="barrier rv">
          <div class="n">BARRIER 03</div>
          <h4>Density over clarity</h4>
          <p>Crowded maps, surge banners and tiny labels turn a simple errand into a test of patience for older and low-vision riders.</p>
        </div>
      </div>

      <div class="insightbar rv" style="margin-top:36px">
        <div class="k">Design question</div>
        <div class="t">What would booking a ride look like if you never had to read or type to do it?</div>
      </div>
    </section>

    <!-- 02 RESEARCH -->
    <section class="cs-section rv" id="research">
      <div class="snum">STOP 02, RESEARCH</div>
      <h2>I went looking for the moment people give up.</h2>
      <p class="sub">Before sketching a single screen, I framed the problem around who gets excluded and why. The research mixed listening to real riders with tearing down what existing apps demand of them.</p>

      <div class="methods">
        <div class="method rv"><div class="ic">1</div><div><h4>Contextual user interviews</h4><p>Spoke with auto riders across age and literacy levels, students, daily commuters, elders, and non-English speakers, about how they actually hail a ride today.</p></div></div>
        <div class="method rv"><div class="ic">2</div><div><h4>Competitive teardown</h4><p>Mapped the pickup-to-confirm flow of leading ride apps screen by screen, counting every read, tap and decision forced before a car is booked.</p></div></div>
        <div class="method rv"><div class="ic">3</div><div><h4>Language &amp; accessibility audit</h4><p>Tested which steps collapse for someone who reads a regional script, not English, and where a screen reader or large-text user loses the thread.</p></div></div>
        <div class="method rv"><div class="ic">4</div><div><h4>Journey mapping</h4><p>Plotted the emotional arc from “I need a ride” to “the driver is here,” marking each point of friction, confusion and drop-off.</p></div></div>
      </div>

      <div class="insightbar rv">
        <div class="k">The insight everything turned on</div>
        <div class="t">People don’t want to find their location on a map. They already know where they are, they just want to <em>say it</em>.</div>
      </div>

      <div class="prose rv" style="margin-top:30px">
        <p>That reframed the whole brief. Typing was never the goal; it was a tax. If the app could listen, in the rider’s own language, the hardest screen in every other ride app could simply disappear. Voice stopped being a feature and became the spine of the product.</p>
      </div>

      <!-- interactive: what riders told me -->
      <div class="rv" style="margin-top:38px">
        <div class="snum" style="color:var(--green)">↳ WHAT RIDERS TOLD ME · tap a quote to see the design response</div>
        <div class="voices" id="voices">
          <div class="voice" data-voice tabindex="0" role="button" aria-expanded="false">
            <span class="toggle-i">+</span>
            <div class="heard"><span class="qm">“</span><span class="qt">I never know the exact name of the place. I just know it’s near the temple.</span></div>
            <div class="who2">, rider, 60s, occasional user</div>
            <div class="resp"><div class="resp-in"><span class="rk">→ what I changed</span><p>Dropped the demand for a precise typed address. The rider describes the place out loud; the app resolves and plays it back for a simple yes/no.</p></div></div>
          </div>
          <div class="voice" data-voice tabindex="0" role="button" aria-expanded="false">
            <span class="toggle-i">+</span>
            <div class="heard"><span class="qm">“</span><span class="qt">The app is in English. I can read Tamil, so I ask my son to book for me.</span></div>
            <div class="who2">, rider, first smartphone</div>
            <div class="resp"><div class="resp-in"><span class="rk">→ what I changed</span><p>Made language the first choice and put a one-tap toggle on every screen, so the rider never depends on someone else to translate the interface.</p></div></div>
          </div>
          <div class="voice" data-voice tabindex="0" role="button" aria-expanded="false">
            <span class="toggle-i">+</span>
            <div class="heard"><span class="qm">“</span><span class="qt">Too many buttons. By the time I find the right one, I’ve missed the auto on the road.</span></div>
            <div class="who2">, daily commuter</div>
            <div class="resp"><div class="resp-in"><span class="rk">→ what I changed</span><p>Cut each screen to a single decision with one dominant action, so booking is fast enough to do while an auto is still in sight.</p></div></div>
          </div>
          <div class="voice" data-voice tabindex="0" role="button" aria-expanded="false">
            <span class="toggle-i">+</span>
            <div class="heard"><span class="qm">“</span><span class="qt">I want to know the price before I sit in. I don’t like surprises at the end.</span></div>
            <div class="who2">, rider on a budget</div>
            <div class="resp"><div class="resp-in"><span class="rk">→ what I changed</span><p>Surfaced fare, capacity and arrival time together on every ride tier, the price is a promise made before the tap, not after.</p></div></div>
          </div>
        </div>
      </div>
    </section>

    <!-- 03 PERSONAS -->
    <section class="cs-section rv" id="who">
      <div class="snum">STOP 03, WHO I DESIGNED FOR</div>
      <h2>Two riders kept the decisions honest.</h2>
      <p class="sub">Interviews clustered into a handful of people. Two of them sat on either end of the comfort spectrum and became the test for every screen: if it worked for both, it shipped.</p>

      <div class="personas">
        <div class="persona rv">
          <div class="ava">L</div>
          <h4>Lakshmi, 58</h4>
          <div class="role">Retired teacher · first-time app user</div>
          <p class="need">Reads Tamil comfortably, English slowly. Owns a smartphone her son set up. Avoids ride apps because “too many things to press.”</p>
          <span class="tag">Voice over typing</span><span class="tag">Tamil UI</span><span class="tag">Large, calm screens</span>
        </div>
        <div class="persona rv">
          <div class="ava">A</div>
          <h4>Arjun, 24</h4>
          <div class="role">Commuter · power user</div>
          <p class="need">Books two autos a day between college and work. Fast and bilingual, but tired of clutter, surge banners and re-typing the same pickup.</p>
          <span class="tag">Speed</span><span class="tag">Recent places</span><span class="tag">Clear price up front</span>
        </div>
      </div>
    </section>

    <!-- 04 PRINCIPLES -->
    <section class="cs-section rv" id="principles">
      <div class="snum">STOP 04, PRINCIPLES</div>
      <h2>Three rules I designed against.</h2>
      <p class="sub">Mobile-first wasn’t a viewport size here, it was the whole context. One hand, on the move, sometimes a first smartphone, often not in English.</p>

      <div class="principles">
        <div class="principle rv"><div class="pn">PRINCIPLE 01</div><h4>Voice is the default, not the fallback</h4><p>The mic is the largest, brightest thing on the booking screen. Typing still exists, but it’s the alternative, not the assumption.</p></div>
        <div class="principle rv"><div class="pn">PRINCIPLE 02</div><h4>Language travels with the user</h4><p>One toggle, present on every screen, flips the entire interface, labels, prompts and voice, between English and the regional language.</p></div>
        <div class="principle rv"><div class="pn">PRINCIPLE 03</div><h4>One decision per screen</h4><p>Each step asks exactly one thing. Big targets, plain words, generous space, readable at arm’s length, tappable on the move.</p></div>
      </div>

      <!-- interactive: teardown step counter -->
      <div class="teardown rv">
        <div class="td-head">
          <h4>Counting the cost of typing</h4>
          <button class="td-play" id="tdPlay">▶ Trace both pickup flows</button>

    <!-- 05 PROTOTYPE -->
    <section class="cs-section rv" id="prototype">
      <div class="snum">STOP 05, THE PROTOTYPE</div>
      <h2>Try the core flow.</h2>
      <p class="sub">This is the booking journey, rebuilt to play with right here. Press the mic, watch the location resolve, choose a ride, confirm. Flip the toggle on the phone to see the same flow in Tamil, the feature the whole product is built around.</p>

      <div class="proto-wrap">
        <div class="proto-copy">
          <h4>Voice-led booking, end to end</h4>
          <p>No address bar, no map-pin dragging. The rider speaks; the app confirms what it heard, prices the ride transparently, and books. Every label here switches language live.</p>

          </ol>
          <div class="proto-hint">↳ try the <strong style="color:var(--ink)">English / தமிழ்</strong> toggle on the phone</div>

(function(){
  /* ---------- bilingual strings for the phone prototype ---------- */
  var TA = {
    pick_title:"உங்கள் பிக்-அப் இடம் என்ன?",
    pick_cap:"மைக்-ஐ அழுத்தி உங்கள் பிக்-அப் இடத்தைக் கூறுங்கள்.",
    confirm_title:"இது உங்கள் பிக்-அப் இடமா?",
    addr1:"வடவள்ளி, கோயம்புத்தூர்",
    confirm_btn:"ஆம், சரிதான்",
    retry_btn:"மீண்டும் கூறுங்கள்",
    rides_title:"அருகிலுள்ள சவாரிகள்",

    book_btn:"ஆட்டோ பதிவு செய்",
    arriving:"2 நிமிடத்தில் வரும்",
    auto_lbl:"ஆட்டோ",
    otp_lbl:"OTP",
    call_btn:"அழை",
    chat_btn:"அரட்டை"
  };
  var EN = {
    pick_title:"What is your pick-up location?",
    pick_cap:"Tap the mic and say your pick-up location aloud",
    confirm_title:"Is this your pick-up?",
    addr1:"Vadavalli, Coimbatore",
    confirm_btn:"Yes, that’s right",
    retry_btn:"Say it again",
    rides_title:"Rides near you",
    r_auto:"3 seats · 2 min away",
    r_mini:"4 seats · 5 min away",
    r_sedan:"5 seats · 10 min away",
    book_btn:"Book auto",
    arriving:"Arriving in 2 min",
    auto_lbl:"Auto",
    otp_lbl:"OTP",
    call_btn:"Call",
    chat_btn:"Chat"
  };
  var lang = "en";
  var screen = document.getElementById('screen');

  function applyLang(){
    var dict = lang==="en"?EN:TA;
    screen.querySelectorAll('[data-t]').forEach(function(el){
      var k = el.getAttribute('data-t'); if(dict[k]!=null) el.textContent = dict[k];
    });
    screen.querySelectorAll('[data-tog]').forEach(function(t){
      t.classList.toggle('ta', lang==="ta");
      t.querySelector('[data-lab-en]').classList.toggle('act', lang==="en");
      t.querySelector('[data-lab-ta]').classList.toggle('act', lang==="ta");
    });
  }
  screen.addEventListener('click', function(e){
    if(e.target.closest('[data-tog]')){ lang = lang==="en"?"ta":"en"; applyLang(); }
  });

  /* ---------- screen state machine ---------- */
  function show(name){
    screen.querySelectorAll('.st').forEach(function(s){ s.classList.toggle('show', s.getAttribute('data-screen')===name); });
    markStep(name);
  }
  function markStep(name){
    document.querySelectorAll('#protoSteps li').forEach(function(li){
      li.classList.toggle('on', li.getAttribute('data-step')===name);
    });
  }
  var order = ["pickup","listening","resolved","rides","confirmed"];
  function backFrom(){
    var cur = screen.querySelector('.st.show').getAttribute('data-screen');
    var i = order.indexOf(cur); if(i>1) show(order[i-1]); else show("pickup");
  }

  var mic = document.getElementById('mic');
  var listenTxt = document.getElementById('listenTxt');
  var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function runListen(){
    mic.classList.add('live'); markStep('listening');
    var phrase = lang==="en" ? "“I’m at Vadavalli…”" : "“நான் வடவள்ளியில்…”";
    if(reduce){ listenTxt.textContent = phrase; finish(); return; }
    listenTxt.textContent = "● listening";
    setTimeout(function(){ listenTxt.textContent = phrase; }, 900);
    setTimeout(finish, 2000);
    function finish(){ mic.classList.remove('live'); show('resolved'); listenTxt.textContent=""; }
  }
  mic.addEventListener('click', runListen);

  /* button wiring */
  document.body.addEventListener('click', function(e){
    var go = e.target.closest('[data-go]'); if(go){ show(go.getAttribute('data-go')); return; }
    if(e.target.closest('[data-back]')){ backFrom(); return; }
    var r = e.target.closest('[data-ride]');
    if(r){ r.parentNode.querySelectorAll('[data-ride]').forEach(function(x){x.classList.remove('sel')}); r.classList.add('sel'); }
  });
  document.getElementById('resetBtn').addEventListener('click', function(){ show('pickup'); listenTxt.textContent=""; mic.classList.remove('live'); });

  applyLang(); markStep('pickup');

  /* ---------- interactive: voice cards ---------- */
  document.querySelectorAll('[data-voice]').forEach(function(card){
    function toggle(){
      var open = card.classList.toggle('open');
      card.setAttribute('aria-expanded', open?'true':'false');
      card.querySelector('.toggle-i').textContent = open ? '+' : '+';
    }
    card.addEventListener('click', toggle);
    card.addEventListener('keydown', function(e){ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); toggle(); } });
  });

  /* ---------- interactive: thumb zone ---------- */
  var thumbBtn = document.getElementById('thumbBtn');
  var thumbOv = document.getElementById('thumbOv');
  thumbBtn.addEventListener('click', function(){
    var on = thumbOv.classList.toggle('on');
    thumbBtn.textContent = on ? '✕ hide thumb zone' : '👍 show thumb zone';
  });

  /* ---------- interactive: teardown ---------- */
  var tdPlay = document.getElementById('tdPlay');
  var tdFoot = document.getElementById('tdFoot');
  var col1 = document.querySelectorAll('#tdCol1 .td-steps li');
  var col2 = document.querySelectorAll('#tdCol2 .td-steps li');
  var t1tap=document.getElementById('t1tap'), t1read=document.getElementById('t1read');
  var t2tap=document.getElementById('t2tap'), t2read=document.getElementById('t2read');
  var tdRunning=false;
  function tdReset(){
    [].concat([].slice.call(col1),[].slice.call(col2)).forEach(function(li){li.classList.remove('in')});
    t1tap.textContent='0'; t1read.textContent='0'; t2tap.textContent='0'; t2read.textContent='0';
  }
  function classifyTap(li){ var t=li.querySelector('.tag'); return t && (t.classList.contains('tap')); }
  function classifyRead(li){ var t=li.querySelector('.tag'); return t && t.classList.contains('read'); }
  function classifySay(li){ var t=li.querySelector('.tag'); return t && t.classList.contains('say'); }
  function tdRun(){
    if(tdRunning) return; tdRunning=true; tdReset();
    tdFoot.textContent='';
    var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var seq=[]; col1.forEach(function(li){seq.push(['1',li])}); col2.forEach(function(li){seq.push(['2',li])});
    var i=0, c1t=0,c1r=0,c2t=0,c2r=0;
    function next(){
      if(i>=seq.length){
        tdRunning=false;
        tdFoot.innerHTML='Same outcome — a booked ride. One flow asks for <strong>'+c1t+' taps</strong> and <strong>'+c1r+' reads</strong>; AutoKar asks for <strong>'+c2t+' taps</strong> and one spoken phrase.';
        return;
      }
      var pair=seq[i++], col=pair[0], li=pair[1];
      li.classList.add('in');
      if(col==='1'){ if(classifyTap(li))c1t++; if(classifyRead(li))c1r++; t1tap.textContent=c1t; t1read.textContent=c1r; }
      else { if(classifyTap(li))c2t++; t2tap.textContent=c2t; if(classifySay(li))t2read.textContent='1'; }
      if(reduce) next(); else setTimeout(next, 360);
    }
    next();
  }
  tdPlay.addEventListener('click', tdRun);
  /* auto-run once when scrolled into view */
  var tdObs=new IntersectionObserver(function(es){ es.forEach(function(en){ if(en.isIntersecting){ tdRun(); tdObs.disconnect(); } }); }, {threshold:.4});
  if(tdPlay) tdObs.observe(document.querySelector('.teardown'));

  /* ---------- spine + progress ---------- */
  var journey = document.getElementById('journey');
  var trail = document.getElementById('trail');
  var auto = document.getElementById('spineAuto');
  var barFill = document.getElementById('barFill');
  var barPct = document.getElementById('barPct');
  function onScroll(){
    var jr = journey.getBoundingClientRect();
    var jTop = window.scrollY + jr.top;
    var jH = journey.offsetHeight - 120;
    var p = (window.scrollY + window.innerHeight*0.5 - jTop) / jH;
    p = Math.max(0, Math.min(1, p));
    trail.style.height = (p*jH) + "px";
    auto.style.top = (p*jH) + "px";
    // overall page progress for the meter
    var docH = document.documentElement.scrollHeight - window.innerHeight;
    var gp = Math.max(0, Math.min(1, window.scrollY/docH));
    barFill.style.width = (gp*100)+"%";
    barPct.textContent = String(Math.round(gp*100)).padStart(2,'0')+"%";
  }
  window.addEventListener('scroll', onScroll, {passive:true});
  window.addEventListener('resize', onScroll);
  onScroll();

  /* ---------- hero auto on path ---------- */
  var heroPath = document.getElementById('heroPath');
  var heroAuto = document.getElementById('heroAuto');
  if(heroPath && heroAuto && !reduce){
    var len = heroPath.getTotalLength(); var t=0; var dir=1;
    function tick(){
      t += 0.0016*dir; if(t>=1){t=1;dir=-1;} if(t<=0){t=0;dir=1;}
      var pt = heroPath.getPointAtLength(t*len);
      var pt2 = heroPath.getPointAtLength(Math.min(len, t*len+1));
      var ang = Math.atan2(pt2.y-pt.y, pt2.x-pt.x)*180/Math.PI;
      heroAuto.setAttribute('transform','translate('+pt.x+','+pt.y+') rotate('+ang+')'+(dir<0?' scale(-1,1)':''));
      requestAnimationFrame(tick);
    }
    tick();
  } else if(heroPath && heroAuto){
    var pt = heroPath.getPointAtLength(heroPath.getTotalLength()*0.5);
    heroAuto.setAttribute('transform','translate('+pt.x+','+pt.y+')');
  }

  /* ---------- reveals + count up ---------- */
  var io = new IntersectionObserver(function(es){
    es.forEach(function(en){
      if(en.isIntersecting){
        en.target.classList.add('in');
        var c = en.target.querySelector?.('[data-count]');
        en.target.querySelectorAll?.('[data-count]').forEach(countUp);
        io.unobserve(en.target);
      }
    });
  }, {threshold:0, rootMargin:'0px 0px -12% 0px'});
  document.querySelectorAll('.rv').forEach(function(el){ io.observe(el); });

  function countUp(el){
    var target = parseInt(el.getAttribute('data-count'),10); if(isNaN(target)) return;
    if(reduce){ el.textContent=target; return; }
    var n=0, step=Math.max(1,Math.ceil(target/24));
    var id=setInterval(function(){ n+=step; if(n>=target){n=target;clearInterval(id);} el.textContent=n; }, 34);
  }
})();

  var ns=document.createElement('style');
  ns.textContent='.ps-nav{display:grid;grid-template-columns:1fr auto 1fr;gap:14px;align-items:stretch;padding:44px clamp(18px,5vw,56px);background:#0f0e12;color:#fff;font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;border-top:1px solid rgba(255,255,255,.12)}.ps-nav a{text-decoration:none;color:inherit}.ps-nav .side{display:flex;flex-direction:column;gap:4px;padding:16px 20px;border-radius:14px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.04);transition:background .2s,border-color .2s}.ps-nav .side:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.32)}.ps-nav .side.next{text-align:right;align-items:flex-end}.ps-nav .dir{font-size:11px;letter-spacing:.14em;text-transform:uppercase;opacity:.6}.ps-nav .ttl{font-size:17px;font-weight:650;line-height:1.2}.ps-nav .home{display:inline-flex;align-items:center;justify-content:center;align-self:center;padding:12px 22px;border-radius:999px;font-size:13px;font-weight:600;white-space:nowrap;border:1px solid rgba(255,255,255,.28);background:rgba(255,255,255,.06)}.ps-nav .home:hover{background:rgba(255,255,255,.14)}@media(max-width:680px){.ps-nav{grid-template-columns:1fr 1fr;gap:10px;padding:28px 18px}.ps-nav .home{grid-column:1/-1;order:-1}.ps-nav .ttl{font-size:14px}}';
  root.appendChild(ns);
  var nav=document.createElement('nav'); nav.className='ps-nav'; nav.setAttribute('aria-label','Case study navigation');
  nav.innerHTML='<a class="side" href="'+hrefFor(prev[0])+'"><span class="dir">← Previous</span><span class="ttl">'+prev[1]+'</span></a>'
    +'<a class="home" href="'+WORK+'">↑ All work</a>'
    +'<a class="side next" href="'+hrefFor(next[0])+'"><span class="dir">Next →</span><span class="ttl">'+next[1]+'</span></a>';
  root.appendChild(nav);
})();
</script>
