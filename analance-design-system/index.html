<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analance, Building a Design System from Scratch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Roboto:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============ TOKENS, the case study runs on the same system it documents ============ */
:host{
  --blue-50:#eeedfe; --blue-100:#dad8fb; --blue-500:#6366f1; --blue-600:#4f46e5; --blue-700:#4338ca;
  --success:#2E9E5B; --warning:#E8A33D; --danger:#E5484D;
  --r-xs:2px; --r-sm:4px; --r-md:6px; --r-lg:8px; --r-xl:12px;
  --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s6:24px; --s8:32px; --s12:48px; --s16:64px; --s24:96px;
  --maxw:1180px;
  --display:'Archivo',system-ui,sans-serif;
  --body:'Inter',system-ui,sans-serif;
  --ui:'Roboto',system-ui,'Helvetica Neue',Arial,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --ease:cubic-bezier(.22,.61,.36,1);
}
/* Light theme */
:host([data-theme="light"]){
  --canvas:#F5F6F8; --surface:#FFFFFF; --surface-2:#EDEEF1; --inset:#F8F9FB;
  --border:#E3E5E9; --border-strong:#CBCED6;
  --text:#1A1A1E; --muted:#6D6C6E; --faint:#9A9CA4;
  --accent:#4f46e5; --accent-soft:#eeedfe;
  --shadow-lg:0 16px 50px -12px rgba(20,28,48,.22);
  --shadow-sm:0 1px 3px rgba(20,28,48,.08),0 1px 1px rgba(20,28,48,.04);
  --grid-line:rgba(20,28,48,.05);
}
/* Dark theme */
:host([data-theme="dark"]){
  --canvas:#141414; --surface:#1F1F1F; --surface-2:#262626; --inset:#1A1A1A;
  --border:#2E2E2E; --border-strong:#3A3A3A;
  --text:#ECECEC; --muted:#9A9A9A; --faint:#6E6E6E;
  --accent:#818cf8; --accent-soft:#211f3d;
  --shadow-lg:0 20px 60px -12px rgba(0,0,0,.6);
  --shadow-sm:0 1px 2px rgba(0,0,0,.4);
  --grid-line:rgba(255,255,255,.04);
}
*{box-sizing:border-box;margin:0;padding:0}
:host{scroll-behavior:smooth}
:host{
  background:var(--canvas);color:var(--text);font-family:var(--body);
  font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;
  transition:background .5s var(--ease),color .5s var(--ease);
  overflow-x:hidden;
}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;scroll-behavior:auto!important}.reveal{opacity:1!important;transform:none!important}}
img{max-width:100%;display:block}
a{color:inherit}
::selection{background:var(--accent);color:#fff}

.wrap{max-width:var(--maxw);margin:0 auto;padding:0 var(--s6)}
.eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-weight:500;display:flex;align-items:center;gap:10px}
.eyebrow::before{content:"";width:26px;height:1px;background:var(--accent);display:inline-block;opacity:.6}
h1,h2,h3{font-family:var(--display);font-weight:600;line-height:1.08;letter-spacing:-.02em}
.muted{color:var(--muted)}

/* ============ HEADER ============ */
header.topbar{
  position:sticky;top:0;z-index:100;backdrop-filter:blur(14px);
  background:color-mix(in srgb,var(--canvas) 82%,transparent);
  border-bottom:1px solid var(--border);
}
.topbar-inner{max-width:var(--maxw);margin:0 auto;padding:14px var(--s6);display:flex;align-items:center;gap:var(--s6)}
.brand{display:flex;align-items:center;gap:10px;font-family:var(--display);font-weight:600;font-size:15px;letter-spacing:-.01em}
.brand .dot{width:22px;height:22px;border-radius:6px;background:conic-gradient(from 210deg,var(--blue-600),var(--blue-500),#8ab6f5);box-shadow:0 0 0 1px var(--border)}
.navlinks{display:flex;gap:2px;margin-left:auto;font-size:13px}
.navlinks a{padding:6px 11px;border-radius:var(--r-md);color:var(--muted);text-decoration:none;font-weight:500;transition:.2s}
.navlinks a:hover{color:var(--text);background:var(--surface-2)}
.toggle{
  margin-left:8px;display:inline-flex;align-items:center;gap:8px;cursor:pointer;border:1px solid var(--border);
  background:var(--surface);border-radius:999px;padding:5px 7px;font-family:var(--mono);font-size:11px;color:var(--muted);
  letter-spacing:.06em;transition:.25s;user-select:none;
}
.toggle:hover{border-color:var(--border-strong)}
.toggle .knob{width:18px;height:18px;border-radius:50%;background:var(--accent);transition:.3s var(--ease);display:grid;place-items:center;color:#fff;font-size:10px}
:host([data-theme="light"]) .toggle .lt{color:var(--text);font-weight:600}
:host([data-theme="dark"]) .toggle .dk{color:var(--text);font-weight:600}
.progress{position:fixed;top:0;left:0;height:2px;background:var(--accent);width:0;z-index:200;transition:width .1s linear}

/* ============ HERO ============ */
.hero{position:relative;padding:var(--s24) 0 var(--s16);overflow:hidden}
.hero-bg{position:absolute;inset:0;z-index:0;
  background-image:linear-gradient(var(--grid-line) 1px,transparent 1px),linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);
  background-size:48px 48px;mask-image:radial-gradient(120% 80% at 50% 0%,#000 30%,transparent 75%);}
.hero .wrap{position:relative;z-index:1}
.hero h1{font-size:clamp(38px,7vw,76px);margin:var(--s4) 0 var(--s4);font-weight:700;max-width:14ch}
.hero h1 .flip{position:relative;display:inline-block}
.hero h1 em{font-style:normal;color:var(--accent)}
.hero .lead{font-size:clamp(16px,2vw,20px);max-width:54ch;color:var(--muted);line-height:1.55}
.meta{display:flex;flex-wrap:wrap;gap:var(--s8);margin-top:var(--s8);padding-top:var(--s6);border-top:1px solid var(--border)}
.meta div{min-width:120px}
.meta dt{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:6px}
.meta dd{font-size:14px;font-weight:500;line-height:1.5}

/* theme split showcase */
.showcase{position:relative;margin-top:var(--s12);border-radius:var(--r-xl);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow-lg)}
.showcase .label{position:absolute;top:12px;z-index:3;font-family:var(--mono);font-size:11px;letter-spacing:.1em;padding:4px 10px;border-radius:999px;background:rgba(0,0,0,.55);color:#fff;backdrop-filter:blur(6px)}
.showcase .label.l{left:12px}.showcase .label.r{right:12px}
.compare{position:relative;width:100%;aspect-ratio:1500/842;background:#0d0d0d;overflow:hidden}
.compare img{position:absolute;top:0;left:0;width:100%;height:auto;display:block}
.compare .top{clip-path:inset(0 0 0 var(--split,50%))}
.divider{position:absolute;top:0;bottom:0;left:var(--split,50%);width:2px;background:var(--accent);z-index:4;cursor:ew-resize;transform:translateX(-1px)}
.divider .grip{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:38px;height:38px;border-radius:50%;background:var(--accent);display:grid;place-items:center;color:#fff;box-shadow:0 6px 18px rgba(0,0,0,.4);font-size:14px}
.compare-hint{text-align:center;font-family:var(--mono);font-size:11px;color:var(--faint);margin-top:12px;letter-spacing:.08em}

/* ============ SECTION SCAFFOLD ============ */
section.block{padding:var(--s16) 0;border-top:1px solid var(--border)}
.sec-head{display:flex;align-items:baseline;gap:var(--s4);flex-wrap:wrap;margin-bottom:var(--s8)}
.sec-no{font-family:var(--mono);font-size:13px;color:var(--accent);font-weight:600}
.sec-head h2{font-size:clamp(26px,4vw,40px)}
.sec-head .sub{flex-basis:100%;max-width:62ch;color:var(--muted);margin-top:6px;font-size:16px}

/* reveal */
.reveal{opacity:0;transform:translateY(18px);transition:opacity .7s var(--ease),transform .7s var(--ease)}
.reveal.in{opacity:1;transform:none}

/* ============ generic grids/cards ============ */
.cards{display:grid;gap:var(--s4)}
.cols-2{grid-template-columns:repeat(2,1fr)}
.cols-3{grid-template-columns:repeat(3,1fr)}
.cols-4{grid-template-columns:repeat(4,1fr)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);padding:var(--s6);transition:.3s}
.card:hover{border-color:var(--border-strong);transform:translateY(-3px)}
.card h3{font-size:18px;margin-bottom:8px}
.card p{font-size:14.5px;color:var(--muted)}
.card .ix{font-family:var(--mono);font-size:12px;color:var(--accent);margin-bottom:14px;display:block}

.figure{border:1px solid var(--border);border-radius:var(--r-xl);overflow:hidden;background:var(--surface);box-shadow:var(--shadow-sm)}
.figure img{width:100%}
.figcap{padding:12px 16px;font-size:13px;color:var(--muted);border-top:1px solid var(--border);display:flex;gap:10px;align-items:center}
.figcap .tag{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:999px;background:var(--surface-2);color:var(--muted)}

/* ============ PROBLEM / understand ============ */
.split2{display:grid;grid-template-columns:1.1fr 1fr;gap:var(--s12);align-items:start}
.understand{display:grid;gap:var(--s3)}
.u-row{display:grid;grid-template-columns:auto 1fr;gap:var(--s4);padding:var(--s4) 0;border-bottom:1px dashed var(--border);align-items:start}
.u-row .k{font-family:var(--mono);font-size:12px;color:var(--accent);white-space:nowrap;padding-top:2px}
.u-row .v strong{display:block;font-size:15px;margin-bottom:3px}
.u-row .v span{font-size:14px;color:var(--muted)}

/* audit findings */
.findings{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:var(--s3);margin-top:var(--s6)}
.finding{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--danger);border-radius:var(--r-md);padding:14px 16px}
.finding b{font-family:var(--display);font-size:30px;font-weight:700;display:block;line-height:1}
.finding span{font-size:12.5px;color:var(--muted);display:block;margin-top:4px}

/* ============ GOALS ============ */
.goal{position:relative;overflow:hidden}
.goal .num{position:absolute;right:-6px;top:-14px;font-family:var(--display);font-weight:700;font-size:96px;color:var(--text);opacity:.05;line-height:1}

/* ============ FOUNDATIONS ============ */
.found-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--s4)}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);padding:var(--s6)}
.panel .ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--s4)}
.panel .ph h3{font-size:16px}
.panel .ph .pid{font-family:var(--mono);font-size:11px;color:var(--faint)}

/* swatches */
.swatch-row{display:flex;gap:6px;flex-wrap:wrap}
.swatch{flex:1;min-width:64px;border-radius:var(--r-md);overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:.2s}
.swatch:hover{transform:translateY(-3px)}
.swatch .chip{height:54px}
.swatch .meta{padding:7px 8px;background:var(--surface)}
.swatch .meta b{font-family:var(--mono);font-size:10px;display:block;letter-spacing:.02em}
.swatch .meta small{font-size:9.5px;color:var(--faint)}
.neutrals{display:flex;border-radius:var(--r-md);overflow:hidden;border:1px solid var(--border);margin-top:10px}
.neutrals span{flex:1;height:34px;display:flex;align-items:flex-end;justify-content:center;font-family:var(--mono);font-size:8px;color:rgba(128,128,128,.9);padding-bottom:3px}

/* type scale */
.panel.span2{grid-column:1/-1}
.type-wrap{display:grid;grid-template-columns:.85fr 1.15fr;gap:var(--s8);align-items:start}
.specimen{border-right:1px solid var(--border);padding-right:var(--s6)}
.specimen .big{font-family:var(--ui);font-weight:700;font-size:clamp(56px,9vw,104px);line-height:.92;letter-spacing:-.03em}
.specimen .face{font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.specimen .why{font-size:13.5px;color:var(--muted);margin-top:14px;max-width:34ch}
.specimen .glyphs{font-family:var(--ui);font-size:19px;color:var(--muted);letter-spacing:.04em;margin-top:16px;word-spacing:2px;line-height:1.5}
.weights{display:flex;flex-wrap:wrap;gap:18px;margin-top:18px}
.weights span{font-family:var(--ui);font-size:22px;line-height:1.1}
.weights span small{font-family:var(--mono);font-size:9.5px;color:var(--faint);display:block;letter-spacing:.06em;font-weight:400;margin-top:2px}
.typescale > div{display:flex;align-items:baseline;gap:14px;padding:11px 0;border-bottom:1px solid var(--border)}
.typescale > div:last-child{border:none}
.typescale .name{font-family:var(--mono);font-size:10px;color:var(--faint);width:108px;flex-shrink:0;line-height:1.4}
.typescale .sample{font-family:var(--ui);line-height:1.05;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
@media(max-width:760px){.type-wrap{grid-template-columns:1fr;gap:var(--s6)}.specimen{border-right:none;border-bottom:1px solid var(--border);padding-right:0;padding-bottom:var(--s6)}}

/* spacing */
.spacescale{display:flex;flex-direction:column;gap:9px}
.spacescale .sp{display:flex;align-items:center;gap:12px}
.spacescale .bar{height:14px;background:linear-gradient(90deg,var(--accent),var(--blue-500));border-radius:2px}
.spacescale .lbl{font-family:var(--mono);font-size:11px;color:var(--muted);width:78px}

/* radius + elevation */
.radius-demo{display:flex;gap:12px;align-items:flex-end}
.radius-demo .rd{flex:1;background:var(--surface-2);border:1px solid var(--border-strong);height:60px}
.radius-demo .rd span{font-family:var(--mono);font-size:9px;color:var(--muted);display:block;text-align:center;margin-top:6px}
.elev-demo{display:flex;gap:16px}
.elev-demo .e{flex:1;height:60px;border-radius:var(--r-md);background:var(--surface);border:1px solid var(--border)}
.elev-demo .e.e1{box-shadow:var(--shadow-sm)}
.elev-demo .e.e2{box-shadow:0 4px 14px rgba(0,0,0,.12)}
.elev-demo .e.e3{box-shadow:var(--shadow-lg)}

/* icons + motion */
.iconset{display:grid;grid-template-columns:repeat(8,1fr);gap:8px}
.iconset .ic{aspect-ratio:1;border:1px solid var(--border);border-radius:var(--r-md);display:grid;place-items:center;color:var(--text);background:var(--surface)}
.iconset svg{width:20px;height:20px;stroke:currentColor;stroke-width:1.6;fill:none;stroke-linecap:round;stroke-linejoin:round}
.motion-dot{width:14px;height:14px;border-radius:50%;background:var(--accent);animation:slide 2.4s var(--ease) infinite}
@keyframes slide{0%,100%{transform:translateX(0)}50%{transform:translateX(160px)}}

/* ============ TOKENS TABLE ============ */
.tok{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12.5px;overflow:hidden;border-radius:var(--r-lg);border:1px solid var(--border)}
.tok th{text-align:left;font-weight:600;padding:12px 14px;background:var(--surface-2);color:var(--muted);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase}
.tok td{padding:11px 14px;border-top:1px solid var(--border);background:var(--surface)}
.tok td.name{color:var(--accent)}
.tok .sw{display:inline-block;width:13px;height:13px;border-radius:3px;border:1px solid var(--border-strong);vertical-align:-2px;margin-right:7px}

/* ============ COMPONENTS (live + spec) ============ */
.btn-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.btn{font-family:var(--body);font-size:13px;font-weight:600;border-radius:var(--r-md);padding:9px 16px;border:1px solid transparent;cursor:pointer;transition:.18s}
.btn.primary{background:var(--accent);color:#fff}
.btn.primary:hover{background:var(--blue-600);filter:brightness(1.08)}
.btn.secondary{background:transparent;color:var(--accent);border-color:var(--accent)}
.btn.ghost{background:transparent;color:var(--text);border-color:var(--border)}
.btn.danger{background:var(--danger);color:#fff}
.btn:disabled{opacity:.4;cursor:not-allowed}
.state-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.state-chip{font-family:var(--mono);font-size:10px;letter-spacing:.05em;padding:5px 10px;border-radius:999px;background:var(--surface-2);color:var(--muted);border:1px solid var(--border)}

.inv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.inv-cell{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;text-align:center;transition:.25s}
.inv-cell:hover{border-color:var(--accent);transform:translateY(-2px)}
.inv-cell .ico{height:34px;display:grid;place-items:center;color:var(--accent);margin-bottom:8px}
.inv-cell .ico svg{width:26px;height:26px;stroke:currentColor;fill:none;stroke-width:1.5}
.inv-cell b{font-size:13px;display:block}
.inv-cell small{font-family:var(--mono);font-size:10px;color:var(--faint)}

/* ============ A11Y ============ */
.a11y-grid{display:grid;grid-template-columns:1.2fr 1fr;gap:var(--s8);align-items:start}
.contrast{display:grid;gap:10px}
.cr-row{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:14px;padding:12px 16px;border-radius:var(--r-lg);border:1px solid var(--border)}
.cr-row .chip{font-size:13px;font-weight:600;padding:7px 14px;border-radius:var(--r-sm)}
.cr-row .ratio{font-family:var(--mono);font-size:14px;font-weight:600}
.cr-row .badge{font-family:var(--mono);font-size:10px;font-weight:600;padding:4px 9px;border-radius:999px}
.badge.aaa{background:rgba(46,158,91,.15);color:var(--success)}
.badge.aa{background:rgba(0,104,216,.14);color:var(--accent)}
.a11y-list{display:grid;gap:12px}
.a11y-item{display:flex;gap:12px;align-items:flex-start}
.a11y-item .tick{flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;display:grid;place-items:center;font-size:11px;margin-top:2px}
.a11y-item b{font-size:14.5px;display:block;margin-bottom:2px}.a11y-item span{font-size:13.5px;color:var(--muted)}
.focus-demo{margin-top:6px;display:inline-block;padding:9px 16px;border-radius:var(--r-md);background:var(--accent);color:#fff;font-weight:600;font-size:13px;outline:3px solid var(--accent);outline-offset:3px}

/* ============ OPERATING (docs/eng/patterns/gov) ============ */
.ops{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--s4)}
.ops .card .ico{color:var(--accent);margin-bottom:12px}
.ops .card .ico svg{width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:1.6}
.codeblock{font-family:var(--mono);font-size:12px;background:var(--inset);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;overflow:auto;line-height:1.7;margin-top:14px}
.codeblock .c{color:var(--faint)}.codeblock .k{color:var(--accent)}.codeblock .v{color:var(--success)}

/* ============ OUTCOMES ============ */
.gallery{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--s4)}
.impact{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--s4);margin-top:var(--s8)}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);padding:var(--s6);text-align:center}
.stat b{font-family:var(--display);font-size:clamp(34px,5vw,52px);font-weight:700;line-height:1;display:block;background:linear-gradient(120deg,var(--accent),var(--blue-500));-webkit-background-clip:text;background-clip:text;color:transparent}
.stat span{font-size:13px;color:var(--muted);display:block;margin-top:8px}

/* footer */
footer{padding:var(--s16) 0 var(--s12);border-top:1px solid var(--border);text-align:center}
footer .big{font-family:var(--display);font-size:clamp(24px,4vw,40px);font-weight:600;letter-spacing:-.02em;max-width:18ch;margin:0 auto var(--s6)}
footer .credit{font-family:var(--mono);font-size:12px;color:var(--faint);letter-spacing:.06em}

/* ============ RESPONSIVE ============ */
@media(max-width:900px){
  .split2,.a11y-grid{grid-template-columns:1fr;gap:var(--s8)}
  .cols-4{grid-template-columns:repeat(2,1fr)}
  .cols-3{grid-template-columns:1fr}

<!-- 01 UNDERSTAND -->
<section class="block" id="understand">
  <div class="wrap">
    <div class="sec-head reveal">
      <span class="sec-no">AUDIT</span>
      <h2>Understand the product</h2>
      <p class="sub">Before drawing a single component, I mapped what Analance actually does and who relies on it. A design system that ignores the product it serves becomes a pretty library nobody adopts.</p>
    </div>
    <div class="split2">
      <div class="understand reveal">
        <div class="u-row"><span class="k">goal/business</span><div class="v"><strong>Self-service analytics, faster</strong><span>Help analysts build reports, datasources and cubes without waiting on IT, reduce time-to-insight.</span></div></div>
        <div class="u-row"><span class="k">journey/core</span><div class="v"><strong>Browse → Create → Configure → Share</strong><span>Users live in dense data tables, creation modals and a multi-pane editor. Flows I had to honor, not flatten.</span></div></div>
        <div class="u-row"><span class="k">arch/surface</span><div class="v"><strong>3 themes, dozens of modules</strong><span>Bell, Light and Dark themes across workbooks, datasources, reports and admin, all sharing components.</span></div></div>
      </div>
      <div class="cards cols-1 reveal" style="gap:16px">
        <div class="card goal"><span class="ix">// the brief</span><h3>Overcome heuristic violations</h3><p>The existing light and dark themes carried years of inconsistent patterns, the revamp had to lift usability and accessibility, not just repaint.</p></div>
        <div class="card goal"><span class="ix">// the constraint</span><h3>Two themes, one source of truth</h3><p>Every decision needed a light value and a dark value. Theming couldn't be an afterthought bolted on at the end, it had to be structural.</p></div>
      </div>
    </div>
  </div>
</section>

<!-- 03 GOALS -->
<section class="block" id="goals">
  <div class="wrap">
    <div class="sec-head reveal">
      <span class="sec-no">SYSTEM</span>
      <h2>Define the system's goals</h2>
      <p class="sub">Four commitments the audit made non-negotiable. Every later decision was measured against these.</p>
    </div>
    <div class="cards cols-4 reveal">
      <div class="card goal"><span class="num">01</span><span class="ix">// consistency</span><h3>Consistency</h3><p>One button is the button. Same anatomy, same behavior, everywhere it appears.</p></div>
      <div class="card goal"><span class="num">02</span><span class="ix">// scalability</span><h3>Scalability</h3><p>New modules compose from existing parts instead of inventing fresh ones.</p></div>
      <div class="card goal"><span class="num">03</span><span class="ix">// a11y</span><h3>Accessibility</h3><p>WCAG AA as the floor, contrast, focus and targets built in, not bolted on.</p></div>
      <div class="card goal"><span class="num">04</span><span class="ix">// velocity</span><h3>Faster delivery</h3><p>Designers and engineers pull from the same tokens, fewer round-trips, faster ship.</p></div>
    </div>
  </div>
</section>

<!-- 07 A11Y -->
<section class="block" id="a11y">
  <div class="wrap">
    <div class="sec-head reveal">
      <span class="sec-no">SYSTEM</span>
      <h2>Establish accessibility standards</h2>
      <p class="sub">Every color pairing was checked against WCAG. These are the real ratios for the system's text colors, measured, not guessed.</p>
    </div>
    <div class="a11y-grid">
      <div class="contrast reveal">
        <div class="cr-row"><span class="chip" style="background:#FFFFFF;color:#1A1A1E;border:1px solid #E3E5E9">Ink on white</span><span class="ratio">17.35:1</span><span class="badge aaa">AAA</span></div>
        <div class="cr-row"><span class="chip" style="background:#4f46e5;color:#fff">White on primary</span><span class="ratio">5.29:1</span><span class="badge aa">AA</span></div>
        <div class="cr-row"><span class="chip" style="background:#FFFFFF;color:#6D6C6E;border:1px solid #E3E5E9">Muted on white</span><span class="ratio">5.22:1</span><span class="badge aa">AA</span></div>
        <div class="cr-row"><span class="chip" style="background:#1F1F1F;color:#ECECEC">Text on dark surface</span><span class="ratio">13.45:1</span><span class="badge aaa">AAA</span></div>
        <div class="cr-row"><span class="chip" style="background:#141414;color:#9A9A9A">Muted on dark bg</span><span class="ratio">6.43:1</span><span class="badge aa">AA</span></div>
      </div>
      <div class="a11y-list reveal">
        <div class="a11y-item"><span class="tick">✓</span><div><b>Keyboard navigation</b><span>Every interactive element reachable and operable without a mouse.</span></div></div>
        <div class="a11y-item"><span class="tick">✓</span><div><b>Visible focus states</b><span>A 3px accent ring on focus, never removed, never invisible.</span></div></div>
        <div class="a11y-item"><span class="tick">✓</span><div><b>Touch targets ≥ 44px</b><span>Controls sized so they're tappable, not just clickable.</span></div></div>
        <div class="a11y-item"><span class="tick">✓</span><div><b>AA contrast floor</b><span>No text ships below 4.5:1; primary reading text targets AAA.</span></div></div>

      </div>
    </div>
  </div>
</section>

<!-- 08 OPERATING THE SYSTEM -->
<section class="block" id="operate">
  <div class="wrap">
    <div class="sec-head reveal">
      <span class="sec-no">GOVERN</span>
      <h2>Make it last, docs, engineering &amp; governance</h2>
      <p class="sub">A system that isn't documented or owned decays. I wrote the usage rules, handed engineering a clean token map, and set up how the system grows after launch.</p>
    </div>
    <div class="ops">
      <div class="card reveal">
        <div class="ico"><svg viewBox="0 0 24 24"><path d="M6 3h9l3 3v15H6z"/><path d="M9 9h6M9 13h6M9 17h4"/></svg></div>
        <h3>Documentation</h3>
        <p>Each component shipped with anatomy, usage guidelines, do's &amp; don'ts, and accessibility notes, so the right choice is the easy choice.</p>
      </div>
      <div class="card reveal">
        <div class="ico"><svg viewBox="0 0 24 24"><path d="M8 6L3 12l5 6M16 6l5 6-5 6"/></svg></div>
        <h3>Engineering handoff</h3>
        <p>Tokens mapped 1:1 to CSS variables with a shared naming convention, so a designer's <code>color.action.primary</code> is the engineer's too.</p>
        <div class="codeblock"><span class="c">/* one token, two themes */</span><br><span class="k">--color-action-primary</span>: <span class="v">#4f46e5</span>; <span class="c">/* light + dark */</span><br><span class="k">--color-bg-surface</span>: <span class="v">#FFFFFF</span>;<br>[data-theme=dark] <span class="k">--color-bg-surface</span>: <span class="v">#1F1F1F</span>;</div>
      </div>
      <div class="card reveal">
        <div class="ico"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="5" rx="1"/><rect x="3" y="11" width="11" height="5" rx="1"/><rect x="3" y="18" width="16" height="3" rx="1"/></svg></div>
        <h3>Patterns &amp; templates</h3>
        <p>Reusable layouts for forms, data tables, dashboards, empty states and page grids, so new screens start 80% done.</p>
      </div>
      <div class="card reveal">
        <div class="ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></div>
        <h3>Governance</h3>
        <p>A contribution and review process, semantic versioning, and adoption tracking, the system has owners, not just authors.</p>
      </div>
    </div>
  </div>
</section>

<!-- 09 OUTCOME -->

<script type="text/html" id="cs-code">

// theme toggle — CSS is keyed on :host[data-theme], so the attribute must live on the
// shadow host, not the real <html> (the template's <html data-theme="dark"> is stripped in shadow DOM).
const root=shadowRoot.host, tg=document.getElementById('themeToggle'), knob=document.getElementById('knob');
function setTheme(t){root.setAttribute('data-theme',t);knob.textContent=t==='dark'?'◑':'◐';}
function flip(){setTheme(root.getAttribute('data-theme')==='dark'?'light':'dark');}
setTheme(root.getAttribute('data-theme')||'dark');
tg.addEventListener('click',flip);
tg.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();flip();}});

// scroll progress
const prog=document.getElementById('progress');
addEventListener('scroll',()=>{const h=document.documentElement;const p=h.scrollTop/(h.scrollHeight-h.clientHeight);prog.style.width=(p*100)+'%';},{passive:true});

// reveal on scroll
const reveals=document.querySelectorAll('.reveal');
if('IntersectionObserver' in window){
  const io=new IntersectionObserver((es)=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}})},{threshold:.08});
  reveals.forEach(el=>io.observe(el));
  // safety net: reveal anything still hidden after 2.5s (e.g. tall elements)
  setTimeout(()=>reveals.forEach(el=>el.classList.add('in')),2500);
}else{reveals.forEach(el=>el.classList.add('in'));}

// before/after compare slider (also keyboard accessible via the draggable handle)
const cmp=document.getElementById('compare'), div=document.getElementById('divider'), cmpTop=document.getElementById('compareTop');
let dragging=false;
function setSplit(x){const r=cmp.getBoundingClientRect();let pct=((x-r.left)/r.width)*100;pct=Math.max(2,Math.min(98,pct));div.style.setProperty('--split',pct+'%');cmpTop.style.clipPath='inset(0 0 0 '+pct+'%)';}
function startDrag(){dragging=true;document.body.style.userSelect='none';}
function endDrag(){dragging=false;document.body.style.userSelect='';}
div.addEventListener('mousedown',startDrag);
addEventListener('mouseup',endDrag);
addEventListener('mousemove',e=>{if(dragging)setSplit(e.clientX);});
div.addEventListener('touchstart',startDrag,{passive:true});
addEventListener('touchend',endDrag);
addEventListener('touchmove',e=>{if(dragging&&e.touches[0])setSplit(e.touches[0].clientX);},{passive:true});
cmp.addEventListener('click',e=>{if(e.target!==div&&!div.contains(e.target))setSplit(e.clientX);});

</script>
