<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Analance MLOps, Designing data science around business outcomes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============ TOKENS ============ */
:host{
  /* Dark "data terminal" palette */
  --paper:#0E1320;
  --paper-2:#161D2E;
  --card:#171F31;
  --ink:#080B14;
  --ink-2:#131A2A;
  --ink-3:#1B2335;
  --graphite:#E4E8F1;
  --slate:#9BA7BE;
  --slate-2:#6B7790;
  --on-dark:#E7EAF1;
  --on-dark-mute:#9AA3B8;
  --line:rgba(255,255,255,.10);
  --line-dark:rgba(255,255,255,.10);
  --cobalt:#22D3EE;
  --cobalt-soft:#67E8F9;
  --cobalt-tint:rgba(34,211,238,.10);
  --ember:#F0A845;
  --ember-tint:rgba(240,168,69,.14);

  --display:'Geist','Segoe UI',sans-serif;
  --sans:'Geist',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'Geist Mono',ui-monospace,'SFMono-Regular',Menlo,monospace;

  --maxw:1120px;
  --gutter:clamp(20px,5vw,72px);
  --nav-h:58px;
}

/* ============ RESET ============ */
*{box-sizing:border-box;margin:0;padding:0}
:host{scroll-behavior:smooth}
:host{
  font-family:var(--sans);
  background:var(--paper);
  color:var(--graphite);
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow-x:hidden;
}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
section{scroll-margin-top:calc(var(--nav-h) + 18px)}

/* ============ TYPE HELPERS ============ */
.eyebrow{
  font-family:var(--mono);
  font-size:12px;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:var(--cobalt);
  display:inline-flex;
  align-items:center;
  gap:10px;
}
.eyebrow.on-dark{color:var(--cobalt-soft)}
.eyebrow::before{
  content:"";
  width:22px;height:1px;background:currentColor;display:inline-block;opacity:.7;
}
h1,h2,h3{font-family:var(--display);font-weight:500;line-height:1.05;letter-spacing:-.01em}
h2{font-size:clamp(28px,4.4vw,50px)}
h3{font-size:clamp(20px,2.4vw,27px);line-height:1.12}
em{font-style:italic}
.lede{font-size:clamp(18px,2.1vw,23px);line-height:1.5;color:var(--graphite)}
.muted{color:var(--slate)}
p{max-width:62ch}

/* ============ LAYOUT ============ */
.wrap{max-width:var(--maxw);margin-inline:auto;padding-inline:var(--gutter)}
.section{padding-block:clamp(64px,9vw,128px)}
.section--dark{background:var(--ink);color:var(--on-dark)}
.section--dark h2,.section--dark h3{color:#fff}
.section--dark .muted{color:var(--on-dark-mute)}
.section--dark .lede{color:var(--on-dark)}
.section--tint{background:var(--paper-2)}
.chapter-head{max-width:760px;margin-bottom:clamp(38px,5vw,64px)}
.chapter-head h2{margin-top:18px}
.chapter-head .lede{margin-top:22px;color:var(--slate)}
.section--dark .chapter-head .lede{color:var(--on-dark-mute)}

/* ============ NAV RAIL (signature: pipeline) ============ */
.rail{
  position:sticky;top:0;z-index:60;height:var(--nav-h);
  display:flex;align-items:center;
  background:rgba(14,19,32,.82);
  backdrop-filter:saturate(140%) blur(12px);
  -webkit-backdrop-filter:saturate(140%) blur(12px);
  border-bottom:1px solid var(--line);
}
.rail .wrap{display:flex;align-items:center;justify-content:space-between;width:100%}
.rail__brand{font-family:var(--mono);font-size:13px;letter-spacing:.04em;color:var(--graphite);display:flex;align-items:center;gap:9px}
.rail__brand b{font-weight:500}
.rail__dot{width:9px;height:9px;border-radius:2px;background:var(--cobalt);transform:rotate(45deg)}
.rail__nav{display:flex;align-items:center;gap:16px}
.rail__current{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--cobalt);min-width:96px;text-align:right}
.pipeline{display:flex;align-items:center;gap:0;position:relative;padding-inline:6px}
.pipeline__line{position:absolute;left:12px;right:12px;top:50%;transform:translateY(-50%);height:1px;background:var(--line);z-index:0}
.pnode{
  position:relative;z-index:1;display:flex;align-items:center;justify-content:center;
  padding:8px 11px;cursor:pointer;background:transparent;border:0;line-height:0;
}
.pnode i{width:11px;height:11px;border-radius:50%;background:var(--paper);border:1.5px solid var(--line);transition:all .25s ease;display:block}
.pnode:hover i{border-color:var(--cobalt)}
.pnode.is-active i{background:var(--cobalt);border-color:var(--cobalt);box-shadow:0 0 0 4px var(--cobalt-tint)}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
@media(max-width:560px){
  .rail__brand b{display:none}
  .rail__current{display:none}
  .pnode{padding:8px 8px}
}

/* ============ HERO ============ */
.hero{position:relative;background:var(--ink);color:var(--on-dark);overflow:hidden;padding-block:clamp(54px,9vw,104px)}
.hero__grid{position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.05) 1px,transparent 1px);background-size:26px 26px;mask-image:radial-gradient(ellipse 90% 70% at 50% 30%,#000 30%,transparent 80%);pointer-events:none}
.hero__glow{position:absolute;top:-15%;right:-5%;width:60vw;height:60vw;max-width:760px;max-height:760px;background:radial-gradient(circle,rgba(43,73,245,.34),transparent 62%);filter:blur(20px);pointer-events:none}
.hero .wrap{position:relative;z-index:2}
.hero__meta-top{display:flex;flex-wrap:wrap;gap:18px;font-family:var(--mono);font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--cobalt-soft);margin-bottom:30px}
.hero__meta-top span{color:var(--on-dark-mute)}
.hero h1{font-size:clamp(38px,7vw,86px);font-weight:400;color:#fff;max-width:16ch}
.hero h1 em{color:var(--cobalt-soft);font-weight:500}
.hero__sub{margin-top:30px;font-size:clamp(17px,1.9vw,21px);line-height:1.55;max-width:60ch;color:var(--on-dark)}
.hero__facts{margin-top:46px;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:1px;background:var(--line-dark);border:1px solid var(--line-dark);border-radius:14px;overflow:hidden}
.hfact{background:var(--ink);padding:20px 22px}
.hfact dt{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--on-dark-mute);margin-bottom:9px}
.hfact dd{font-family:var(--display);font-size:18px;color:#fff;line-height:1.25}
@media(max-width:760px){.hero__facts{grid-template-columns:repeat(2,1fr)}}

/* hero lattice */
.lattice{margin-top:56px;width:100%;height:auto;overflow:visible}
.lat-edge{fill:none;stroke:var(--cobalt-soft);stroke-width:1.6;opacity:.55}
.lat-edge.pulse{stroke-dasharray:6 200;animation:dash 3.4s linear infinite}
.lat-node{fill:var(--ink-2);stroke:var(--cobalt-soft);stroke-width:1.6}
.lat-node.data{fill:rgba(43,73,245,.22);stroke:var(--cobalt-soft)}
.lat-node.recipe{fill:rgba(224,144,46,.22);stroke:var(--ember)}
.lat-node.model{fill:rgba(43,73,245,.3);stroke:#fff}
.lat-label{fill:var(--on-dark-mute);font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase}
.lat-dot{fill:var(--cobalt-soft)}
.lat-dot.amber{fill:var(--ember)}
@keyframes dash{to{stroke-dashoffset:-206}}

/* ============ STAT STRIP ============ */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:clamp(20px,3vw,40px)}
.stat{border-top:2px solid var(--cobalt);padding-top:18px}
.stat:nth-child(2){border-color:var(--ember)}
.stat__num{font-family:var(--display);font-size:clamp(40px,5.5vw,62px);line-height:1;font-weight:500;letter-spacing:-.02em}
.stat__num .u{font-size:.5em;vertical-align:.18em;margin-left:2px;color:var(--slate)}
.stat__lab{margin-top:12px;font-size:14.5px;color:var(--slate);max-width:24ch}
.stat__sub{font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--slate-2);margin-top:6px}
@media(max-width:860px){.stats{grid-template-columns:repeat(2,1fr);row-gap:34px}}

/* ============ TWO-COL PROSE ============ */
.prose-2{display:grid;grid-template-columns:1fr 1fr;gap:clamp(28px,5vw,72px);align-items:start}
.prose-2 p + p{margin-top:18px}
@media(max-width:820px){.prose-2{grid-template-columns:1fr;gap:28px}}

/* ============ POSITIONING CHART ============ */
.posmap{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:clamp(20px,3vw,34px);box-shadow:0 1px 0 rgba(13,18,30,.03)}
.posmap svg{width:100%;height:auto;display:block}
.pm-axis{stroke:var(--line);stroke-width:1}
.pm-grid{stroke:var(--line);stroke-width:1;stroke-dasharray:2 5;opacity:.7}
.pm-axis-label{font-family:var(--mono);font-size:11px;letter-spacing:.06em;fill:var(--slate);text-transform:uppercase}
.pm-quad{font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;fill:var(--slate-2)}
.pm-dot{fill:#fff;stroke:var(--slate);stroke-width:1.5}
.pm-dot-lab{font-family:var(--sans);font-size:13px;fill:var(--graphite);font-weight:500}
.pm-us circle{fill:var(--cobalt);stroke:#fff;stroke-width:2}
.pm-us text{fill:var(--cobalt);font-weight:700;font-size:14px}
.pm-halo{fill:var(--cobalt-tint)}

/* ============ RESEARCH METHODS ============ */
.methods{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-top:8px}
.method{background:var(--card);padding:24px 22px}
.method b{font-family:var(--display);font-size:34px;font-weight:500;display:block;line-height:1}
.method span{display:block;margin-top:10px;font-size:14px;color:var(--slate)}
.method em{font-family:var(--mono);font-style:normal;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--cobalt);display:block;margin-top:3px}
@media(max-width:760px){.methods{grid-template-columns:repeat(2,1fr)}}

/* ============ PERSONAS ============ */
.personas{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
.persona{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:26px 26px 24px;position:relative}
.persona__role{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--cobalt)}
.persona h3{margin:10px 0 4px;font-size:24px}
.persona__need{color:var(--slate);font-size:15px}
.persona__quote{margin-top:18px;padding-top:18px;border-top:1px solid var(--line);font-family:var(--display);font-style:italic;font-size:17px;line-height:1.4;color:var(--graphite)}
@media(max-width:680px){.personas{grid-template-columns:1fr}}

/* ============ FINDINGS ============ */
.finding{display:grid;grid-template-columns:64px 1fr;gap:8px 26px;padding:28px 0;border-top:1px solid var(--line-dark)}
.finding:first-of-type{border-top:0}
.finding__n{font-family:var(--mono);font-size:13px;color:var(--cobalt-soft);padding-top:7px}
.finding h3{color:#fff}
.finding p{color:var(--on-dark-mute);margin-top:10px;max-width:64ch}
.finding__tag{display:inline-block;margin-top:14px;font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--cobalt-soft);border:1px solid var(--line-dark);border-radius:999px;padding:4px 12px}
@media(max-width:620px){.finding{grid-template-columns:1fr;gap:4px}.finding__n{padding-top:0}}

/* ============ PRINCIPLES ============ */
.principles{counter-reset:p;border-top:1px solid var(--line)}
.principle{counter-increment:p;display:grid;grid-template-columns:auto 1fr;gap:24px;align-items:baseline;padding:26px 0;border-bottom:1px solid var(--line)}
.principle__n{font-family:var(--mono);font-size:13px;color:var(--cobalt)}
.principle__n::before{content:"P" counter(p)}
.principle h3{font-size:clamp(21px,2.6vw,30px)}
.principle p{margin-top:8px;color:var(--slate);max-width:70ch}
.principle strong{color:var(--ember);font-weight:600}

/* ============ MODULE TABS ============ */
.tabs{display:flex;flex-wrap:wrap;gap:8px;border-bottom:1px solid var(--line);margin-bottom:34px}
.tab{font-family:var(--mono);font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--slate);background:transparent;border:0;padding:13px 16px;cursor:pointer;position:relative;transition:color .2s}
.tab[aria-selected="true"]{color:var(--cobalt)}
.tab[aria-selected="true"]::after{content:"";position:absolute;left:16px;right:16px;bottom:-1px;height:2px;background:var(--cobalt)}
.tab:hover{color:var(--graphite)}
.panel{display:none;grid-template-columns:1fr 1.18fr;gap:clamp(28px,4vw,56px);align-items:center;animation:fade .4s ease}
.panel.is-open{display:grid}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.panel__ptag{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ember);margin-bottom:14px}
.panel h3{margin-bottom:16px}
.insight{display:flex;gap:12px;margin-top:18px;font-size:15px}
.insight .k{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--cobalt);min-width:64px;padding-top:3px;flex-shrink:0}
.insight .v{color:var(--graphite)}
.insight .v.mut{color:var(--slate)}
@media(max-width:840px){.panel.is-open{grid-template-columns:1fr;gap:30px}.panel__media{order:-1}}

/* ============ SCREEN FRAME ============ */
.screen{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--card);box-shadow:0 24px 60px -28px rgba(13,18,40,.35),0 2px 6px rgba(13,18,40,.05)}
.screen__bar{display:flex;align-items:center;gap:14px;padding:11px 16px;background:var(--paper-2);border-bottom:1px solid var(--line)}
.screen__dots{display:flex;gap:6px}
.screen__dots i{width:10px;height:10px;border-radius:50%;background:#CBD2DF;display:block}
.screen__url{font-family:var(--mono);font-size:11.5px;color:var(--slate);background:var(--card);border:1px solid var(--line);border-radius:7px;padding:5px 12px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.screen img{width:100%;display:block}

/* ============ OUTCOMES ============ */
.bigstats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line-dark);border:1px solid var(--line-dark);border-radius:16px;overflow:hidden}
.bigstat{background:var(--ink);padding:34px 30px}
.bigstat__num{font-family:var(--display);font-size:clamp(46px,6vw,72px);line-height:1;font-weight:500;color:#fff}
.bigstat__num .u{font-size:.42em;color:var(--cobalt-soft);margin-left:4px;vertical-align:.2em}
.bigstat__lab{margin-top:16px;color:var(--on-dark-mute);font-size:14.5px;max-width:26ch}
.bigstat__from{font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--slate-2);margin-top:10px}
@media(max-width:780px){.bigstats{grid-template-columns:1fr}}

.quotes{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:46px}
.quote{background:var(--ink-2);border:1px solid var(--line-dark);border-radius:16px;padding:30px}
.quote p{font-family:var(--display);font-style:italic;font-size:clamp(19px,2.2vw,24px);line-height:1.4;color:#fff;max-width:none}
.quote footer{margin-top:18px;font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--cobalt-soft)}
@media(max-width:680px){.quotes{grid-template-columns:1fr}}

/* ============ REFLECTION ============ */
.reflect{display:grid;grid-template-columns:1fr 1fr;gap:clamp(24px,4vw,56px)}
.reflect h3{margin-bottom:14px}
.reflect ul{list-style:none}
.reflect li{padding:14px 0;border-top:1px solid var(--line);font-size:15.5px;color:var(--slate);display:grid;grid-template-columns:18px 1fr;gap:12px}
.reflect li::before{content:"";width:8px;height:8px;border-radius:2px;background:var(--cobalt);transform:rotate(45deg);margin-top:8px}
.reflect li.next::before{background:var(--ember)}
.reflect li b{color:var(--graphite);font-weight:600}
@media(max-width:760px){.reflect{grid-template-columns:1fr;gap:30px}}

/* ============ FOOTER ============ */
.foot{background:var(--ink);color:var(--on-dark);padding-block:clamp(54px,7vw,80px)}
.foot h2{color:#fff;max-width:18ch}
.foot .wrap{display:grid;grid-template-columns:1.4fr 1fr;gap:40px;align-items:end}
.foot__meta{font-family:var(--mono);font-size:12px;line-height:2;color:var(--on-dark-mute)}
.foot__meta b{color:#fff;font-weight:500}
.foot__note{grid-column:1/-1;margin-top:42px;padding-top:22px;border-top:1px solid var(--line-dark);font-family:var(--mono);font-size:11px;color:var(--slate-2);letter-spacing:.02em;max-width:none}
@media(max-width:680px){.foot .wrap{grid-template-columns:1fr;gap:28px}}

/* ============ REVEAL ============ */
.reveal{opacity:0;transform:translateY(20px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)}
.reveal.in{opacity:1;transform:none}
.reveal[data-d="1"]{transition-delay:.08s}
.reveal[data-d="2"]{transition-delay:.16s}
.reveal[data-d="3"]{transition-delay:.24s}

@media(prefers-reduced-motion:reduce){
  *{animation:none!important;scroll-behavior:auto!important}
  .reveal{opacity:1;transform:none;transition:none}
}
:focus-visible{outline:2px solid var(--cobalt);outline-offset:3px;border-radius:3px}

/* ============ LIVE PROTOTYPE ============ */
.proto-note{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px 26px;margin-bottom:22px}
.proto-note__ptag{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ember)}
.proto-note h3{font-size:clamp(19px,2.3vw,26px);margin:4px 0 14px}
.proto-note__insights{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.proto-note .insight{margin-top:0}
@media(max-width:760px){.proto-note__insights{grid-template-columns:1fr;gap:11px}}
.proto-hint{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--cobalt);margin-left:auto;white-space:nowrap}
.proto-hint b{width:7px;height:7px;border-radius:50%;background:var(--cobalt);display:block;animation:blink 1.8s ease-in-out infinite}
@keyframes blink{50%{opacity:.25}}
.screen--live .screen__bar{flex-wrap:wrap;gap:10px}
.screen--live .screen__url{flex:1;min-width:120px}

.tp{--tp-blue:#1c64f2;--tp-blue-d:#1750c5;--tp-ink:#1f2733;--tp-sub:#717c8c;--tp-line:#e7ebf1;--tp-side:#eef2f9;--tp-amber:#ec9a2e;--tp-hi:#eaf1fe;
  display:flex;height:clamp(460px,64vh,610px);background:#fff;color:var(--tp-ink);font-size:13px;line-height:1.45;overflow:hidden}
.tp *{box-sizing:border-box}
.tp__side{width:120px;flex-shrink:0;background:var(--tp-side);border-right:1px solid var(--tp-line);padding:14px 0;display:flex;flex-direction:column;gap:2px}
.tp__brandmark{width:26px;height:26px;border-radius:7px;background:var(--tp-blue);margin:0 auto 14px;position:relative}
.tp__brandmark::after{content:"";position:absolute;inset:7px;border:2px solid #fff;border-radius:3px}
.tp__navitem{display:flex;flex-direction:column;align-items:center;gap:5px;padding:11px 6px;cursor:pointer;background:none;border:0;border-left:3px solid transparent;color:var(--tp-sub);font-size:11px;width:100%;transition:color .15s,background .15s}
.tp__navitem svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.6}
.tp__navitem:hover{color:var(--tp-ink)}
.tp__navitem.is-active{color:var(--tp-blue);background:#fff;border-left-color:var(--tp-blue);font-weight:600}
.tp__main{flex:1;display:flex;flex-direction:column;min-width:0}

<script type="text/html" id="cs-code">

(function(){
  var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  /* ---- smooth scroll for pipeline nodes ---- */
  document.querySelectorAll('.pnode').forEach(function(btn){
    btn.addEventListener('click',function(){
      var el=document.getElementById(btn.dataset.go);
      if(el) el.scrollIntoView({behavior:reduce?'auto':'smooth',block:'start'});
    });
  });

  /* ---- active section in pipeline nav ---- */
  var sections=['intro','problem','research','synthesis','design','reflection'];
  var nodes={};
  document.querySelectorAll('.pnode').forEach(function(n){nodes[n.dataset.go]=n;});
  var navObs=new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){
        Object.values(nodes).forEach(function(n){n.classList.remove('is-active');});
        var active=nodes[e.target.id];
        if(active){
          active.classList.add('is-active');
          var cur=document.getElementById('railCurrent');
          if(cur)cur.textContent=active.dataset.name;
        }
      }
    });
  },{rootMargin:'-45% 0px -50% 0px'});
  sections.forEach(function(id){var el=document.getElementById(id);if(el)navObs.observe(el);});

  /* ---- reveal on scroll ---- */
  if(reduce){
    document.querySelectorAll('.reveal').forEach(function(el){el.classList.add('in');});
  }else{
    var revObs=new IntersectionObserver(function(entries){
      entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('in');revObs.unobserve(e.target);}});
    },{threshold:.12});
    document.querySelectorAll('.reveal').forEach(function(el){revObs.observe(el);});
  }

  /* ---- count up ---- */
  function animateCount(el){
    var target=parseFloat(el.dataset.count);
    var decimals=(el.dataset.count.indexOf('.')>-1)?1:0;
    var unit=el.querySelector('.u')?el.querySelector('.u').outerHTML:'';
    if(reduce){el.innerHTML=target.toFixed(decimals)+unit;return;}
    var start=null,dur=1400;
    function step(ts){
      if(!start)start=ts;
      var p=Math.min((ts-start)/dur,1);
      var eased=1-Math.pow(1-p,3);
      el.innerHTML=(target*eased).toFixed(decimals)+unit;
      if(p<1)requestAnimationFrame(step);
      else el.innerHTML=target.toFixed(decimals)+unit;
    }
    requestAnimationFrame(step);
  }
  var countObs=new IntersectionObserver(function(entries){
    entries.forEach(function(e){if(e.isIntersecting){animateCount(e.target);countObs.unobserve(e.target);}});
  },{threshold:.6});
  document.querySelectorAll('[data-count]').forEach(function(el){countObs.observe(el);});

  /* ---- module tabs ---- */
  var tabs=document.querySelectorAll('.tab');
  tabs.forEach(function(tab){
    tab.addEventListener('click',function(){
      tabs.forEach(function(t){t.setAttribute('aria-selected','false');});
      tab.setAttribute('aria-selected','true');
      document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('is-open');});
      var panel=document.getElementById(tab.dataset.tab);
      if(panel)panel.classList.add('is-open');
    });
  });

  /* ===== live prototype ===== */
  var tp=document.getElementById('tp');
  if(tp){
    var ANN={
      overview:{t:'Principle 1 · Outcome over artifact',h:'A project is a business challenge, not a folder of files.',f:'F1 — work was organized around pipelines, so sponsors disengaged.',d:'Make the challenge the front door; show intent and status before any tooling.',s:'Sofia lands here and gets it; everyone else uses it as a launchpad.'},
      flows:{t:'Principle 2 · One path, many altitudes',h:'Flows: a visual lattice anyone can read, with code one click in.',f:'F6 — the same person needs no-code and code within one hour.',d:'A visual graph is the shared surface; every node opens to code.',s:'Marcus builds the pipeline; Priya drops into code on the hard 10%.'},
      data:{t:'Principle 5 · Guided, not gated',h:'Guided analysis that says here is what is worth looking at.',f:'F4 — guided exploration was the single most requested capability.',d:'Name analyses in outcome terms and explain when to reach for each.',s:'Marcus gets a map; Priya skips straight to custom experiments.'},

      if(t.hasAttribute('data-tpan')){tp.querySelectorAll('[data-tpan]').forEach(function(r){r.classList.remove('sel');});t.classList.add('sel');tset('tpAnNote','Selected · '+t.getAttribute('data-tpan')+' — added to the project');return;}
      if(t.hasAttribute('data-tppredict')){var di=tp.querySelector('#tpInDisc'),qi=tp.querySelector('#tpInQty');var d=di?parseFloat(di.value):0.1,q=qi?parseFloat(qi.value):5;if(isNaN(d))d=0;if(isNaN(q))q=0;var pred=Math.round((118+q*16-d*240)*100)/100;tset('tpPredOut','$'+pred.toFixed(2));return;}
    });
  }

  /* ===== trimmed-section interactions ===== */
  function txt(id,v){var e=document.getElementById(id);if(e)e.textContent=v;}

  var PER=[
    {l:'P',n:'Priya',r:'Data scientist',need:'Wants total control and a model she can actually explain.',want:'Glass box'},

    {l:'S',n:'Sofia',r:'Business sponsor',need:'Funds it, can\'t read a notebook — needs to see the answer.',want:'See the outcome'}

    {n:'F4',h:'Start from data you can see',p:'Guided exploration beat a blank canvas — the top request, especially from analysts.',stat:'#1 survey request',link:'→ Principle 5'},
    {n:'F5',h:'Ops becomes an emergency',p:'Deploy and monitoring failed loudly because they were bolted on at the end.',stat:'bolted on late',link:'→ Principle 4'},
    {n:'F6',h:'Skill altitude shifts by the minute',p:'The same person wants no-code, then full code, within an hour.',stat:'reframed the design',link:'→ Principle 2'}

  var pmCap=document.getElementById('pmCap');

  document.querySelectorAll('.pm-cat').forEach(function(g){
    function on(){if(pmCap)pmCap.innerHTML=g.getAttribute('data-tip');}
    function off(){if(pmCap)pmCap.innerHTML=pmDef;}
    g.addEventListener('mouseenter',on);g.addEventListener('mouseleave',off);
    g.addEventListener('focusin',on);g.addEventListener('focusout',off);
  });

})();
